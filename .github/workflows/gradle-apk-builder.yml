name: Gradle APK Builder
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Extract imported project
        run: |
          rm -rf imported-project
          mkdir imported-project
          unzip -q .gradle-apk-builder/project.zip -d imported-project
          ROOT=$(find imported-project -maxdepth 3 \( -name settings.gradle -o -name settings.gradle.kts \) -printf '%h\n' | head -1)
          test -n "$ROOT"
          echo "PROJECT_ROOT=$ROOT" >> $GITHUB_ENV
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: false
      - name: Report imported Wrapper checksum
        run: |
          if [ -f "$PROJECT_ROOT/gradle/wrapper/gradle-wrapper.jar" ]; then sha256sum "$PROJECT_ROOT/gradle/wrapper/gradle-wrapper.jar"; fi
      - name: Build debug APK
        run: |
          cd "$PROJECT_ROOT"
          if [ -f gradlew ]; then chmod +x gradlew; ./gradlew --no-daemon assembleDebug; else gradle --no-daemon assembleDebug; fi
      - name: Collect APK files
        run: |
          mkdir -p collected-apks
          find "$PROJECT_ROOT" -type f -path '*/build/outputs/apk/*.apk' -exec cp {} collected-apks/ \;
          test -n "$(find collected-apks -name '*.apk' -print -quit)"
      - uses: actions/upload-artifact@v4
        with:
          name: compiled-apks
          path: collected-apks/*.apk
          if-no-files-found: error
