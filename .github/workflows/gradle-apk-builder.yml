name: Gradle APK Builder
on:
  push:
    paths:
      - '.gradle-apk-builder/project.zip'
      - '.gradle-apk-builder/trigger.json'
      - '.github/workflows/gradle-apk-builder.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Extract and inspect imported project
        run: |
          set -euxo pipefail
          rm -rf imported-project /tmp/imported-gradle
          mkdir imported-project
          unzip -q .gradle-apk-builder/project.zip -d imported-project
          ROOT=$(find imported-project -maxdepth 5 \( -name settings.gradle -o -name settings.gradle.kts \) -printf '%h\n' | head -1)
          test -n "$ROOT"
          echo "PROJECT_ROOT=$ROOT" >> $GITHUB_ENV
          find "$ROOT" -maxdepth 3 -type f | sort | head -200
      - name: Install the project's official Gradle distribution
        run: |
          set -euxo pipefail
          PROP="$PROJECT_ROOT/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$PROP" ]; then
            URL=$(grep '^distributionUrl=' "$PROP" | cut -d= -f2- | sed 's#\\:#:#g')
          else
            URL=https://services.gradle.org/distributions/gradle-8.9-bin.zip
          fi
          case "$URL" in https://services.gradle.org/distributions/*|https://downloads.gradle.org/distributions/*) ;; *) echo '不允许的 Gradle 下载域名'; exit 2;; esac
          curl --fail --location --retry 3 "$URL" -o /tmp/gradle.zip
          mkdir -p /tmp/imported-gradle && unzip -q /tmp/gradle.zip -d /tmp/imported-gradle
          GRADLE_BIN=$(find /tmp/imported-gradle -type f -path '*/bin/gradle' -print -quit)
          chmod +x "$GRADLE_BIN"
          echo "GRADLE_BIN=$GRADLE_BIN" >> $GITHUB_ENV
          "$GRADLE_BIN" --version
      - name: Build debug APK
        run: |
          set -o pipefail
          cd "$PROJECT_ROOT"
          "$GRADLE_BIN" --no-daemon --stacktrace --warning-mode all assembleDebug 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
      - name: Collect APK files
        if: success()
        run: |
          mkdir -p collected-apks
          find "$PROJECT_ROOT" -type f -path '*/build/outputs/apk/*.apk' -exec cp {} collected-apks/ \;
          test -n "$(find collected-apks -name '*.apk' -print -quit)"
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: compiled-apks
          path: collected-apks/*.apk
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: warn
